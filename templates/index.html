<!DOCTYPE html>
<html>
<head>
    <title>Flask Notes App</title>
</head>
<body>
    <h1>Notes App</h1>
    <form action="/add" method="POST">
        <input type="text" name="content" placeholder="Enter a new note" required>
        <button type="submit">Add Note</button>
    </form>
    <ul>
        {% for note in notes %}
            <li>
                {{ note.content }}
                <form action="/delete/{{ note.id }}" method="POST" style="display:inline;">
                    <button type="submit">Delete</button>
                </form>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
